name: Build, Scan, Push, Sign

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'Caddyfile'
      - 'wafctl/**'
      - 'waf-dashboard/**'
      - 'waf/**'
      - 'scripts/**'
      - 'errors/**'
      - 'test/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  CADDY_IMAGE: erfianugrah/caddy
  CADDY_TAG: "3.62.0-2.11.2"
  CADDY_VERSION: "2.11.2"
  CRS_VERSION: "v4.24.1"
  WAFCTL_IMAGE: erfianugrah/wafctl
  WAFCTL_VERSION: "2.66.0"

permissions:
  contents: read
  id-token: write  # cosign keyless signing via GitHub OIDC

jobs:
  # ── Determine which images changed ───────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      caddy: ${{ steps.filter.outputs.caddy }}
      wafctl: ${{ steps.filter.outputs.wafctl }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
        id: filter
        with:
          filters: |
            caddy:
              - 'Dockerfile'
              - 'Caddyfile'
              - 'waf/**'
              - 'scripts/**'
              - 'errors/**'
              - 'tools/**'
            wafctl:
              - 'wafctl/**'
              - 'waf-dashboard/**'
              - 'waf/**'
              - 'tools/**'

  # ── Run tests (gate builds) ─────────────────────────────────────
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false  # wafctl has zero external deps, no go.sum
      - name: Run Go tests
        run: go test -count=1 -timeout 60s ./...
        working-directory: wafctl

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: waf-dashboard/package-lock.json
      - run: npm ci
        working-directory: waf-dashboard
      - run: npx vitest run
        working-directory: waf-dashboard

  # ── E2E smoke tests ──────────────────────────────────────────────
  test-e2e:
    needs: [test-go, test-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: test/e2e/go.sum

      - name: Build test images
        run: |
          docker build -t caddy-e2e:local .
          docker build -t wafctl-e2e:local -f wafctl/Dockerfile .

      - name: Start e2e stack
        run: |
          docker compose -f test/docker-compose.e2e.yml up -d
          # Wait for wafctl health
          for i in $(seq 1 60); do
            curl -sf http://localhost:18082/api/health > /dev/null 2>&1 && break
            sleep 2
          done

      - name: Run e2e tests
        run: go test -v -count=1 -timeout 600s ./...
        working-directory: test/e2e

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f test/docker-compose.e2e.yml logs caddy --tail 50
          docker compose -f test/docker-compose.e2e.yml logs wafctl --tail 50

      - name: Tear down
        if: always()
        run: docker compose -f test/docker-compose.e2e.yml down -v

  # ── Build + scan + push + sign Caddy image ───────────────────────
  caddy:
    needs: [changes, test-go, test-frontend, test-e2e]
    if: needs.changes.outputs.caddy == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set image ref
        id: meta
        run: echo "full=${CADDY_IMAGE}:${CADDY_TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and load locally
        uses: docker/build-push-action@v6
        id: build-local
        with:
          context: .
          load: true
          tags: ${{ steps.meta.outputs.full }}
          build-args: |
            VERSION=${{ env.CADDY_VERSION }}
            CRS_VERSION=${{ env.CRS_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: ${{ steps.meta.outputs.full }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Push image
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.full }}
          build-args: |
            VERSION=${{ env.CADDY_VERSION }}
            CRS_VERSION=${{ env.CRS_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: sigstore/cosign-installer@430b6a704fe0c92f1b1261d84376a900f38d90ff  # main

      - name: Sign image
        continue-on-error: true
        run: cosign sign --yes "${CADDY_IMAGE}@${{ steps.build.outputs.digest }}"

      - name: Generate SBOM
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11  # v0.23.0
        with:
          image: ${{ steps.meta.outputs.full }}
          format: spdx-json
          output-file: caddy.spdx.json

      - name: Attest SBOM
        run: cosign attest --yes --predicate caddy.spdx.json --type spdxjson "${CADDY_IMAGE}@${{ steps.build.outputs.digest }}"

      - name: Verify image exists on registry
        run: docker manifest inspect "${{ steps.meta.outputs.full }}" > /dev/null

  # ── Build + scan + push + sign wafctl image ─────────────────────
  wafctl:
    needs: [changes, test-go, test-frontend, test-e2e]
    if: needs.changes.outputs.wafctl == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set image tag
        id: meta
        run: echo "full=${WAFCTL_IMAGE}:${WAFCTL_VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and load locally
        uses: docker/build-push-action@v6
        id: build-local
        with:
          context: .
          file: ./wafctl/Dockerfile
          load: true
          tags: ${{ steps.meta.outputs.full }}
          build-args: |
            VERSION=${{ env.WAFCTL_VERSION }}
            CRS_VERSION=${{ env.CRS_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: ${{ steps.meta.outputs.full }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Push image
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ./wafctl/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.full }}
          build-args: |
            VERSION=${{ env.WAFCTL_VERSION }}
            CRS_VERSION=${{ env.CRS_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: sigstore/cosign-installer@430b6a704fe0c92f1b1261d84376a900f38d90ff  # main

      - name: Sign image
        continue-on-error: true
        run: cosign sign --yes "${WAFCTL_IMAGE}@${{ steps.build.outputs.digest }}"

      - name: Generate SBOM
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11  # v0.23.0
        with:
          image: ${{ steps.meta.outputs.full }}
          format: spdx-json
          output-file: wafctl.spdx.json

      - name: Attest SBOM
        run: cosign attest --yes --predicate wafctl.spdx.json --type spdxjson "${WAFCTL_IMAGE}@${{ steps.build.outputs.digest }}"

      - name: Verify image exists on registry
        run: docker manifest inspect "${{ steps.meta.outputs.full }}" > /dev/null
