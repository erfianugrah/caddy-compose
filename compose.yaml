services:
  caddy:
    image: erfianugrah/caddy:3.53.0-2.11.1
    hostname: caddy
    container_name: caddy
    restart: unless-stopped
    network_mode: host
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - DAC_OVERRIDE
      - NET_ADMIN # ddos_mitigator nftables kernel drop
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "16"
          memory: 16384M
        reservations:
          cpus: "4"
          memory: 4096M
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:2019/config/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    depends_on:
      authelia:
        condition: service_healthy
        restart: true
    volumes:
      # Config + TLS on cache SSD — fast reads for TLS handshakes + config
      - /mnt/cache/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /mnt/cache/caddy/site:/srv:ro
      - /mnt/cache/caddy/data:/data
      - /mnt/cache/caddy/config:/config
      # Logs on cache SSD — write-heavy, log rotation needs native chown support
      - /mnt/cache/caddy/log:/var/log
      # Dynamic WAF overrides — written by wafctl Policy Engine, polled by plugin
      - /mnt/cache/caddy/waf:/data/waf
      # Temp dirs for read-only root filesystem
      - tmpfs_run:/tmp
      - tmpfs_caddy:/var/run
    environment:
      - TZ=Asia/Singapore
      - CF_API_TOKEN=${CF_API_TOKEN}
      - EMAIL=${EMAIL}

  authelia:
    image: docker.io/authelia/authelia:4.39
    hostname: authelia
    container_name: authelia
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--no-check-certificate",
          "--tries=1",
          "--spider",
          "http://localhost:9091/api/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      authelia:
        ipv4_address: 172.19.99.2
    volumes:
      - /mnt/user/data/authelia/config:/config
      # Authelia writes healthcheck metadata here at startup; bind-mount so read_only doesn't block it
      - /mnt/user/data/authelia/config/.healthcheck.env:/app/.healthcheck.env
      - /mnt/user/data/authelia/secrets:/secrets:ro
    tmpfs:
      - /tmp:size=32M
    environment:
      TZ: "Asia/Singapore"
      # Secrets — loaded from files for security (not visible in docker inspect/proc)
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE: "/secrets/jwt_secret"
      AUTHELIA_SESSION_SECRET_FILE: "/secrets/session_secret"
      AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE: "/secrets/storage_encryption_key"
      AUTHELIA_NOTIFIER_SMTP_PASSWORD_FILE: "/secrets/smtp_password"

  wafctl:
    build:
      context: .
      dockerfile: wafctl/Dockerfile
    image: erfianugrah/wafctl:2.57.0
    hostname: wafctl
    container_name: wafctl
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 256M
        reservations:
          cpus: "1.0"
          memory: 128M
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/api/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      caddy:
        condition: service_healthy
        restart: true
    networks:
      waf:
        ipv4_address: 172.19.98.2
    extra_hosts:
      # Map 'caddy' to the waf network gateway (not host-gateway/docker0) so
      # wafctl can reach Caddy's :2020 admin proxy. Docker inter-network
      # isolation blocks traffic via docker0; routing through the waf bridge
      # keeps traffic within the allowed 172.19.98.0/24 subnet.
      - "caddy:172.19.98.1"
    volumes:
      # Caddy logs — read-only, on cache SSD
      - /mnt/cache/caddy/log:/var/log:ro
      # wafctl config on cache SSD — exclusions, rate-limits, lists, etc.
      - /mnt/cache/caddy/wafctl/config:/data
      # JSONL event files on array — large, append-heavy
      - /mnt/user/data/wafctl/events:/data/events
      # Dynamic WAF overrides — shared with Caddy, on cache
      - /mnt/cache/caddy/waf:/data/waf
      # Caddyfile — read-only, needed for FQDN resolution
      - /mnt/cache/caddy/Caddyfile:/data/Caddyfile:ro
      # GeoIP MMDB database
      - /mnt/cache/caddy/wafctl/geoip:/data/geoip:ro
      # Managed list files — on cache
      - /mnt/cache/caddy/wafctl/lists:/data/lists
    environment:
      - TZ=Asia/Singapore
      - WAF_EXCLUSIONS_FILE=/data/exclusions.json
      - WAF_CONFIG_FILE=/data/waf-config.json
      - WAF_COMBINED_ACCESS_LOG=/var/log/combined-access.log
      - WAF_DIR=/data/waf
      - WAF_CADDYFILE_PATH=/data/Caddyfile
      - WAF_CADDY_ADMIN_URL=http://caddy:2020
      - WAF_GEOIP_DB=/data/geoip/country.mmdb
      - WAF_POLICY_RULES_FILE=/data/waf/policy-rules.json
      # Event JSONL files — on array via /data/events mount
      - WAF_EVENT_FILE=/data/events/events.jsonl
      - WAF_ACCESS_EVENT_FILE=/data/events/access-events.jsonl
      - WAF_GENERAL_LOG_FILE=/data/events/general-events.jsonl
      - WAF_AUDIT_OFFSET_FILE=/data/events/.audit-log-offset
      - WAF_ACCESS_OFFSET_FILE=/data/events/.access-log-offset
      - WAF_GENERAL_LOG_OFFSET_FILE=/data/events/.general-log-offset
      # Managed lists
      - WAF_MANAGED_LISTS_FILE=/data/lists.json
      - WAF_MANAGED_LISTS_DIR=/data/lists

networks:
  authelia:
    driver: bridge
    ipam:
      config:
        - subnet: 172.19.99.0/24
          gateway: 172.19.99.1
  waf:
    driver: bridge
    ipam:
      config:
        - subnet: 172.19.98.0/24
          gateway: 172.19.98.1

volumes:
  tmpfs_run:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=64m
  tmpfs_caddy:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=64m
