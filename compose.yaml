services:
  caddy:
    image: erfianugrah/caddy:3.96.1-2.11.3
    hostname: caddy
    container_name: caddy
    restart: unless-stopped
    network_mode: host
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "16"
          memory: 16384M
        reservations:
          cpus: "4"
          memory: 4096M
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:2019/config/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    volumes:
      # Config + TLS on cache SSD — fast reads for TLS handshakes + config
      - /mnt/user/composer/stacks/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /mnt/cache/caddy/site:/srv:ro
      - /mnt/cache/caddy/data:/data
      - /mnt/cache/caddy/config:/config
      # Logs on cache SSD — write-heavy, log rotation needs native chown support
      - /mnt/cache/caddy/log:/var/log
      # Temp dirs for read-only root filesystem
      - tmpfs_run:/tmp
      - tmpfs_caddy:/var/run
    environment:
      - TZ=Asia/Singapore
      - CF_API_TOKEN=${CF_API_TOKEN}
      - EMAIL=${EMAIL}
      # TSIG key for ACME DNS-01 via our own Knot DNS at knot-fly-mvp on Fly.
      # Used by sites whose `tls { issuer acme { dns rfc2136 { key {$TSIG_CADDY_ACME} ... } } }`
      # references it. See ~/knot-fly/ for the full design.
      - TSIG_CADDY_ACME=${TSIG_CADDY_ACME}
      # TSIG key for the global `dynamic_dns { provider rfc2136 ... }` block.
      # Separate ACL on Knot side: A/AAAA-only writes (no other RR types,
      # no _acme-challenge), so a compromised Caddy can't escalate beyond
      # rewriting host A records. Provisioned alongside caddy-acme; rotate
      # via knotctl. See `knotctl` skill for the four-key-role table.
      - TSIG_CADDY_DDNS=${TSIG_CADDY_DDNS}

volumes:
  tmpfs_run:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=64m
  tmpfs_caddy:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=64m
